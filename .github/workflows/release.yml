name: Release — Build, Package, Publish

# MinVer reads the nearest git tag from the full commit history to derive
# Version automatically — no manual version job needed.
# Tag format:  v<MAJOR>.<MINOR>.<PATCH>  (e.g. git tag v1.0.0)
# Untagged commits get a pre-release suffix:  1.0.0-dev.3

on:
  push:
    # branches: [ master ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────────────────────────
  # dotnet publish — produces self-contained single-file binary per RID
  # MinVer is a build-time package; it resolves Version during dotnet publish.
  # fetch-depth: 0 is REQUIRED so MinVer can walk back to the nearest tag.
  # ─────────────────────────────────────────────────────────────────────
  publish:
    name: Publish (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [ win-x64, win-x86, linux-x64, linux-arm64, linux-arm ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history to find the nearest tag

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.wixproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore GreenSwampAlpaca.slnx

      - name: Publish ${{ matrix.rid }}
        run: >
          dotnet publish GreenSwamp.Alpaca.Server/GreenSwamp.Alpaca.Server.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=false
          -o publish/${{ matrix.rid }}

      # minver-cli runs MinVer directly against the git repo — unlike
      # `dotnet msbuild -getProperty:Version` it actually executes the MinVer
      # target rather than reading the Version property statically (which would
      # always return the SDK default of 1.0.0 instead of the tag-derived version).
      - name: Install MinVer CLI
        run: dotnet tool install --global minver-cli

      - name: Read version from MinVer
        id: minver
        run: |
          VER=$(minver --tag-prefix v 2>/dev/null)
          VER="${VER:-0.0.0-dev}"
          MSI_VER="${VER%%[-+]*}"   # 0.1.2-beta+sha -> 0.1.2
          echo "app_version=$VER" >> $GITHUB_OUTPUT
          echo "msi_version=$MSI_VER" >> $GITHUB_OUTPUT
          echo "MinVer resolved version: $VER"
          echo "MSI-safe version: $MSI_VER"

      - uses: actions/upload-artifact@v4
        with:
          name: greenswamp-alpaca-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/**
          retention-days: 7

    outputs:
      app_version: ${{ steps.minver.outputs.app_version }}
      msi_version: ${{ steps.minver.outputs.msi_version }}


  # ─────────────────────────────────────────────────────────────────────
  # Build .deb packages for Linux x64 and Raspberry Pi (arm64 + armhf)
  # ─────────────────────────────────────────────────────────────────────
  build-deb:
    name: Build DEB (${{ matrix.rid }})
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [ linux-x64, linux-arm64, linux-arm ]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: greenswamp-alpaca-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - name: Install packaging tools
        run: sudo apt-get install -y --no-install-recommends fakeroot dpkg-dev

      - name: Build DEB
        run: |
          chmod +x Installer/Linux/build-deb.sh
          ./Installer/Linux/build-deb.sh \
            ${{ matrix.rid }} \
            ${{ needs.publish.outputs.app_version }}

      - uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.rid }}
          path: "*.deb"
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Build .msi packages for Windows x64 and x86
  # The publish artifacts are downloaded from the publish job so the installer
  # project does not need to rebuild or re-publish the server.
  # MinVer runs automatically during dotnet build via Directory.Build.targets
  # (_SetWixVersionFromMinVer) to populate $(var.InstallerVersion) in the .wxs.
  # fetch-depth: 0 ensures MinVer resolves the same tag as the publish job.
  # ─────────────────────────────────────────────────────────────────────
  build-msi:
    name: Build MSI (${{ matrix.rid }})
    needs: publish
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # UpgradeCode is the permanent GUID for each RID's product family
          # platform must be x64/x86 — WiX does not accept win-x64/win-x86 as Platform values
          - rid: win-x64
            platform: x64
            upgrade_code: "0BFB5E9F-4475-4BFA-A8A5-1F26CD982B1C"
          - rid: win-x86
            platform: x86
            upgrade_code: "D910192D-77C9-499E-80E9-10428B7FB80F"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\NuGet\Cache
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.wixproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - uses: actions/download-artifact@v4
        with:
          name: greenswamp-alpaca-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}

      - name: Build MSI
        # SkipPublish=true          — artifacts already downloaded from the publish job;
        #                             suppresses _PublishServerBeforeWix in the wixproj.
        # BuildProjectReferences=false — Server project output is not used by WiX
        #                             (all files come from PublishDir); avoids restoring
        #                             the Server's full NuGet dependency tree on this runner.
        # AppVersion is omitted      — $(var.InstallerVersion) in the .wxs is now set
        #                             automatically by MinVer via Directory.Build.targets.
        run: >
          dotnet build GreenSwamp.Alpaca.Installer/GreenSwamp.Alpaca.Installer.wixproj
          -c Release
          -p:Platform=${{ matrix.platform }}
          -p:UpgradeCode=${{ matrix.upgrade_code }}
          "-p:PublishDir=${{ github.workspace }}/publish/${{ matrix.rid }}/"
          -p:SkipPublish=true
          -p:BuildProjectReferences=false

      # - name: Restore signing certificate
      #   shell: pwsh
      #   run: |
      #     $bytes = [Convert]::FromBase64String("${{ secrets.CODESIGN_PFX_B64 }}")
      #     [IO.File]::WriteAllBytes("sign.pfx", $bytes)

      # - name: Sign MSI with self-signed certificate
      #   shell: pwsh
      #   run: |
      #     $pwd = ConvertTo-SecureString "${{ secrets.CODESIGN_PFX_PASSWORD }}" -Force -AsPlainText
      #     Import-PfxCertificate -FilePath sign.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pwd | Out-Null
      #     $thumb = (Get-PfxCertificate sign.pfx).Thumbprint
      #     $msi = Get-ChildItem -Recurse -Filter "*.msi" | Select-Object -First 1 -ExpandProperty FullName
      #     signtool sign /fd SHA256 /sha1 $thumb /tr http://timestamp.digicert.com /td SHA256 $msi
      #     Write-Host "Signed: $msi"

      # - name: Clean up certificate file
      #   if: always()
      #   shell: pwsh
      #   run: Remove-Item sign.pfx -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: msi-${{ matrix.rid }}
          path: "**/*.msi"
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all installer artefacts
  # Only runs on tag pushes (not on branch pushes or PRs)
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [ build-deb, build-msi ]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets (diagnostic)
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "GreenSwamp Alpaca Server ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            release-assets/**/*.msi
            release-assets/**/*.deb
